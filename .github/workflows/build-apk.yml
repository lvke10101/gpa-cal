name: Build Android APK

# Runs on every push to main, and can also be triggered manually from
# the Actions tab via "Run workflow".
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Sync latest web assets into Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GradeVault-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
