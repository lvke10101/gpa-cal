name: Build Android APK

# Runs on every push to main, and can also be triggered manually from
# the Actions tab via "Run workflow".
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Sync latest web assets into Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        working-directory: android/app
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build signed release APK
        working-directory: android
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GradeVault-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # Gives the app itself (and anything else) a permanent, unauthenticated
      # URL to link to: https://github.com/lvke10101/gpa-cal/releases/latest/download/app-release.apk
      # The build artifact above is kept too, for CI debugging — it requires
      # a GitHub session and expires, so it's not usable as a public link.
      - name: Publish to rolling 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: Automated build from the latest push to main.
          files: android/app/build/outputs/apk/release/app-release.apk

