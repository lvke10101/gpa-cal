<style>

  .btn-full { width:100%; background:var(--gold); color:#0e0f14; border:none; padding:14px; border-radius:10px; font-weight:600; font-size:15px; cursor:pointer; font-family:inherit; transition:background 0.2s; margin-top:6px; }

  .save-indicator { position:fixed; bottom:16px; right:16px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 14px; font-size:12px; color:var(--text3); opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:200; }

  .save-indicator.saved { opacity:1; color:var(--green2); }
  .toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 18px; font-size:13px; color:var(--text2); opacity:0; transition:opacity 0.3s; z-index:300; white-space:nowrap; pointer-events:none; }
  .toast.show { opacity:1; }
  .toast.error { color:var(--red2); border-color:rgba(192,57,43,0.3); }
  ::-webkit-scrollbar { width:4px; height:4px; }

  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  .header-actions { display:flex; align-items:center; gap:10px; }
  .credit-pill { display:flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--border); border-radius:24px; padding:6px 12px; flex-shrink:0; }

  .credit-pill .credit-amt { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--gold); }
  .credit-pill.low .credit-amt { color:var(--red2); }

  .note-section { margin-top:20px; }
  .note-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .note-title { font-size:13px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.6px; }
  .note-textarea { width:100%; min-height:100px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:var(--radius); padding:14px; font-family:inherit; font-size:14px; outline:none; resize:vertical; transition:border-color 0.2s; }

  .btn-save-note { background:var(--card); color:var(--text2); border:1px solid var(--border); padding:8px 16px; border-radius:9px; font-weight:600; font-size:12px; cursor:pointer; font-family:inherit; transition:all 0.2s; }

const authEmail   = document.getElementById('auth-email');
const authPassword = document.getElementById('auth-password');
const authDept    = document.getElementById('auth-dept');
const deptField   = document.getElementById('dept-field');
const authSubmit  = document.getElementById('auth-submit');
const tabLogin    = document.getElementById('tab-login');
const tabRegister = document.getElementById('tab-register');
const authSwitch     = document.getElementById('auth-switch');
const authSwitchLink = document.getElementById('auth-switch-link');

// ── Helpers ──────────────────────────────────────────────────
function showToast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2800);
}

function fmt(n) { return n === null ? '—' : n.toFixed(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function gpaClass(gpa) {
  if (gpa === null) return '';
  return gpa >= 3.5 ? 'good' : gpa < 2.0 ? 'bad' : '';
}

function classifyGPA(cgpa) {
  if (cgpa === null) return '';
  if (cgpa >= 4.5) return 'First Class';
  if (cgpa >= 3.5) return '2nd Class Upper';
  if (cgpa >= 2.5) return '2nd Class Lower';
  if (cgpa >= 1.5) return 'Third Class';
  return 'Pass';
}

function classifyBadge(cgpa) {
  if (cgpa === null) return '';
  if (cgpa >= 4.5) return 'class-first';
  if (cgpa >= 3.5) return 'class-second-upper';
  if (cgpa >= 2.5) return 'class-second-lower';
  if (cgpa >= 1.5) return 'class-third';
  return 'class-pass';
}

function calcSemGPA(courses) {
  let tgp = 0, tnu = 0;
  courses.forEach(c => {
    const units = parseFloat(c.units) || 0;
    const gp    = GRADE_POINTS[c.grade] ?? null;
    if (units > 0 && gp !== null && c.grade !== '') {
      tgp += gp * units;
      tnu += units;
    }
  });
  if (tnu === 0) return { tgp: 0, tnu: 0, gpa: null };
  return { tgp, tnu, gpa: tgp / tnu };
}

function calcCGPA(sems) {
  let totalTGP = 0, totalTNU = 0;
  SEMS.forEach(s => {
    const { tgp, tnu } = calcSemGPA(sems[s] || []);
    totalTGP += tgp;
    totalTNU += tnu;
  });
  return totalTNU === 0 ? null : totalTGP / totalTNU;
}

// ── Auth UI ──────────────────────────────────────────────────
function showAuthTab(mode) {
  authMode = mode;
  tabLogin.classList.toggle('active', mode === 'login');
  tabRegister.classList.toggle('active', mode === 'register');
  authSubmit.textContent = mode === 'login' ? 'Login' : 'Create Account';
  authPassword.autocomplete = mode === 'login' ? 'current-password' : 'new-password';
  deptField.style.display = mode === 'register' ? 'block' : 'none';
  authError.style.display = 'none';
  authSwitch.firstChild.textContent = mode === 'login' ? "Don't have an account? " : 'Already have an account? ';
  authSwitchLink.textContent = mode === 'login' ? 'Register' : 'Login';
}

function setAuthError(msg) {
  authError.textContent = msg;
  authError.style.display = 'block';
}

// ── Auth submit ─────────────────────────────────────────────
async function submitAuth() {
  const email      = authEmail.value.trim();
  const password   = authPassword.value;
  const department = authDept.value.trim();

  if (!email || !password) {
    setAuthError('Please fill in your email and password.');
    return;
  }
  if (authMode === 'register' && !department) {
    setAuthError('Please select your department.');
    return;
  }

  authSubmit.disabled = true;
  authSubmit.textContent = authMode === 'login' ? 'Logging in…' : 'Creating account…';
  authError.style.display = 'none';

  try {
    let user;

    if (authMode === 'login') {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      user = data.user;
    } else {
      const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: { data: { department } }
      });
      if (error) throw error;

      // No user returned = email already registered (Supabase hides this for security)
      if (!data.user) {
        throw new Error('This email is already registered. Try logging in instead.');
      }
      // No session = email confirmation is ON in Supabase — must be disabled
      if (!data.session) {
        throw new Error('Account created but email confirmation is required. Disable it in your Supabase dashboard under Authentication → Configuration.');
      }

      // Create the profile row
      const { error: profileErr } = await sb.from('gpa_data').upsert({
        id: data.user.id,
        department,
        semesters: {},
        courses: {}
      }, { onConflict: 'id' });
      if (profileErr) throw profileErr;

      user = data.user;
    }

    currentUser = { id: user.id, email: user.email };
    await loadUserData();
    launchApp();
  } catch (err) {
    console.error('Auth error:', err);
    setAuthError(err.message || 'Authentication failed. Please try again.');
  } finally {
    authSubmit.disabled = false;
    authSubmit.textContent = authMode === 'login' ? 'Login' : 'Create Account';
  }
}

async function loadUserData() {
  if (!currentUser) return;
  const { data, error } = await sb
    .from('gpa_data')
    .select('*')
    .eq('id', currentUser.id)
    .maybeSingle();
  if (error) throw error;
  if (!data) {
    const { data: newData, error: insErr } = await sb
      .from('gpa_data')
      .insert({ id: currentUser.id, department: '', semesters: {}, courses: {} })
      .select()
      .single();
    if (insErr) throw insErr;
    userData = newData;
  } else {
    userData = data;
  }
  const sems = userData.semesters || {};
  SEMS.forEach(s => { if (!(s in sems)) sems[s] = []; });
  userData.semesters = sems;
  if (!userData.courses) userData.courses = {};
  if (!userData.notes) userData.notes = {};
}

// ── Credits ──────────────────────────────────────────────────
async function loadCredits() {
  if (!currentUser) return;
  const { data, error } = await sb
    .from('credits')
    .select('balance')
    .eq('id', currentUser.id)
    .maybeSingle();
  if (error) { console.error('Failed to load credits', error); return; }
  userCredits = data ? data.balance : 0;
  renderCredits();
}

function renderCredits() {
  const amt = document.getElementById('credit-amt');
  const pill = document.getElementById('credit-pill');
  if (!amt || !pill) return;
  amt.textContent = userCredits;
  pill.classList.toggle('low', userCredits <= 2);
}

// Attempts to spend `cost` credits. Returns true if successful, false if insufficient.
// Uses a conditional update (balance = old - cost only where balance >= cost) to avoid
// a race where two actions could both pass a stale client-side check.
async function spendCredits(cost, actionLabel) {
  if (!currentUser) return false;
  if (userCredits < cost) {
    showToast(`Insufficient credits — ${actionLabel} requires ${cost}C, you have ${userCredits}C`, true);
    return false;
  }
  const { data, error } = await sb
    .from('credits')
    .update({ balance: userCredits - cost, updated_at: new Date().toISOString() })
    .eq('id', currentUser.id)
    .gte('balance', cost)
    .select('balance')
    .maybeSingle();
  if (error) {
    showToast('Error processing credits: ' + error.message, true);
    return false;
  }
  if (!data) {
    // Someone/something else spent credits in between our check and this update
    await loadCredits();
    showToast(`Insufficient credits — ${actionLabel} requires ${cost}C, you have ${userCredits}C`, true);
    return false;
  }
  userCredits = data.balance;
  renderCredits();
  return true;
}

function launchApp() {
  authScreen.style.display = 'none';
  app.style.display = 'flex';
  const displayName = currentUser.email.split('@')[0];
  document.getElementById('header-name').textContent = displayName;
  document.getElementById('header-av').textContent = displayName.charAt(0).toUpperCase();

  buildYearTabs();
  buildMiniChips();
  switchYear(0, true);
  loadCredits();
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null; userData = null;
  app.style.display = 'none';
  authScreen.style.display = 'flex';
}

// ── Course upload ────────────────────────────────────────────
function generatePin(userId) {
  const encoder = new TextEncoder();
  const data = encoder.encode(userId + PIN_SALT);
  return crypto.subtle.digest('SHA-256', data).then(buf => {
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  });
}

async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const json = JSON.parse(text);
    if (!json.pin || typeof json.courses !== 'object') {
      showToast('Invalid file format', true);
      return;
    }
    const expectedPin = await generatePin(currentUser.id);
    if (json.pin !== expectedPin) {
      showToast('This file is not authorized for your account', true);
      return;
    }
    const ok = await spendCredits(CREDIT_COSTS.upload, 'Uploading courses');
    if (!ok) return;
    userData.courses = json.courses || {};
    const validCourses = {};
    SEMS.forEach(s => { validCourses[s] = Array.isArray(json.courses[s]) ? json.courses[s] : []; });
    userData.courses = validCourses;
    await saveToSupabase();
    showToast('Courses uploaded successfully!');
    renderTable();
  } catch (err) {
    showToast('Error reading file: ' + err.message, true);
  }
  event.target.value = '';
}

// ── Supabase save ────────────────────────────────────────────
async function saveToSupabase() {
  if (!currentUser) return;
  const { error } = await sb
    .from('gpa_data')
    .upsert({
      id: currentUser.id,
      department: userData.department || '',
      semesters: userData.semesters,
      courses: userData.courses,
      notes: userData.notes
    });
  if (error) throw error;
}

function loadNoteForSem() {
  const ta = document.getElementById('note-textarea');
  if (!ta) return;
  ta.value = (userData.notes && userData.notes[currentSem]) || '';
}

async function saveNote() {
  const ta = document.getElementById('note-textarea');
  const btn = document.getElementById('save-note-btn');
  if (!ta) return;
  btn.disabled = true;
  try {
    const ok = await spendCredits(CREDIT_COSTS.saveNote, 'Saving note');
    if (!ok) return;
    if (!userData.notes) userData.notes = {};
    userData.notes[currentSem] = ta.value;
    await saveToSupabase();
    showToast('Note saved');
  } catch (err) {
    showToast('Error saving note: ' + err.message, true);
  } finally {
    btn.disabled = false;
  }
}

function scheduleSave() {
  const ind = document.getElementById('save-ind');
  ind.textContent = 'Saving…';
  ind.className = 'save-indicator saving';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await saveToSupabase();
      ind.textContent = 'Saved ✓';
      ind.className = 'save-indicator saved';
      setTimeout(() => { ind.className = 'save-indicator'; }, 1800);
    } catch (err) {
      ind.textContent = 'Save failed';
      ind.className = 'save-indicator saving';
      setTimeout(() => { ind.className = 'save-indicator'; }, 2500);
      showToast('Save error: ' + err.message, true);
    }
  }, 900);
}

// ── UI Builders ─────────────────────────────────────────────
function buildYearTabs() {
  const container = document.getElementById('year-groups');
  container.innerHTML = YEARS.map((y, i) =>
    `<button class="year-btn" id="ybtn-${i}" onclick="switchYear(${i})">${y.label}</button>`
  ).join('');
}

function buildMiniChips() {
  const container = document.getElementById('mini-chips');
  container.innerHTML = YEARS.map(y =>
    y.sems.map(s =>
      `<div class="stat-chip sm" style="padding-right:12px;">
        <div class="stat-label">${s.toUpperCase()}</div>
        <div class="stat-value" id="mini-${s}">—</div>
      </div>`
    ).join('')
  ).join('');
}

function switchYear(idx, firstLoad=false) {
  currentYear = idx;
  document.querySelectorAll('.year-btn').forEach((b,i) =>
    b.classList.toggle('active', i === idx)
  );
  const year = YEARS[idx];
  const semTabs = document.getElementById('sem-tabs');
  semTabs.innerHTML = year.sems.map(s =>
    `<button class="sem-tab" id="stab-${s}" onclick="switchSem('${s}')">
      ${SEM_SHORT[s]}
      <span class="gpa-tag" id="stab-gpa-${s}">—</span>
    </button>`
  ).join('');
  const target = firstLoad ? 'y1s1' : (year.sems.includes(currentSem) ? currentSem : year.sems[0]);
  switchSem(target);
}

function switchSem(sem) {
  currentSem = sem;
  const yearIdx = YEARS.findIndex(y => y.sems.includes(sem));
  if (yearIdx !== -1 && yearIdx !== currentYear) {
    switchYear(yearIdx, false);
    return;
  }
  document.querySelectorAll('.sem-tab').forEach(t =>
    t.classList.toggle('active', t.id === 'stab-' + sem)
  );
  document.getElementById('sem-title').textContent = SEM_NAMES[sem];
  renderTable();
  updateStats();
  loadNoteForSem();
}

// ── Table rendering ──────────────────────────────────────────
function renderTable() {
  const courses = userData.semesters[currentSem] || [];
  const tbody   = document.getElementById('course-tbody');
  const tfoot   = document.getElementById('totals-foot');

  if (courses.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
      <div class="icon">📚</div>
      <p>No courses yet. Tap <strong>Add Course</strong> to get started.</p>
    </div></td></tr>`;
    tfoot.innerHTML = '';
    document.getElementById('sem-gpa-detail').textContent = '';
    return;
  }

  tbody.innerHTML = courses.map((c, i) => {
    const gp    = GRADE_POINTS[c.grade] ?? null;
    const units = parseFloat(c.units) || 0;
    const contrib = (gp !== null && units > 0 && c.grade !== '') ? (gp * units) : '—';
    const gradeClass = c.grade ? `grade-${c.grade}` : '';
    return `<tr>
      <td><input class="cell-input" value="${esc(c.code)}" placeholder="e.g. FRS 301"
            oninput="updateField(${i},'code',this.value)"/></td>
      <td><input class="cell-input" value="${esc(c.title)}" placeholder="Course title…"
            oninput="updateField(${i},'title',this.value)"/></td>
      <td style="text-align:center">
        <input class="cell-input unit-input" type="number" min="1" max="6"
          value="${c.units||''}" placeholder="2"
          oninput="updateField(${i},'units',this.value)"/>
      </td>
      <td style="text-align:center">
        <select class="grade-select ${gradeClass}" onchange="updateField(${i},'grade',this.value)">
          <option value="">—</option>
          ${['A','B','C','D','E','F'].map(g =>
            `<option value="${g}" ${c.grade===g?'selected':''} class="grade-${g}">${g}</option>`
          ).join('')}
        </select>
      </td>
      <td class="gp-cell" style="text-align:center">${contrib === '—' ? '—' : contrib}</td>
      <td><button class="btn-del" onclick="deleteCourse(${i})">✕</button></td>
    </tr>`;
  }).join('');

  renderTotals(courses);
}

function renderTotals(courses) {
  const { tgp, tnu, gpa } = calcSemGPA(courses);
  const tfoot = document.getElementById('totals-foot');
  tfoot.innerHTML = `
    <tr class="totals-row">
      <td colspan="2" style="text-align:right">Totals</td>
      <td style="text-align:center">${tnu || '—'}</td>
      <td></td>
      <td style="text-align:center">${tgp || '—'}</td>
      <td></td>
    </tr>
    <tr class="totals-row">
      <td colspan="4" style="text-align:right;color:var(--text3)">Semester GPA</td>
      <td class="total-gpa" style="text-align:center">${fmt(gpa)}</td>
      <td></td>
    </tr>`;
  document.getElementById('sem-gpa-detail').textContent =
    gpa !== null ? `TGP ${tgp} ÷ TNU ${tnu} = ${fmt(gpa)}` : '';
}

// ── Course actions ──────────────────────────────────────────
async function addCourse() {
  const ok = await spendCredits(CREDIT_COSTS.addCourse, 'Adding a course');
  if (!ok) return;
  const courses = userData.semesters[currentSem];
  courses.push({ code:'', title:'', units:'', grade:'' });
  renderTable();
  updateStats();
  scheduleSave();
  setTimeout(() => {
    const inputs = document.querySelectorAll('#course-tbody tr:last-child input:first-child');
    if (inputs.length) inputs[0].focus();
  }, 50);
}

function deleteCourse(i) {
  userData.semesters[currentSem].splice(i, 1);
  renderTable();
  updateStats();
  scheduleSave();
}

function updateField(i, field, val) {
  userData.semesters[currentSem][i][field] = val;
  updateTotalsOnly(userData.semesters[currentSem]);
  updateStats();
  scheduleSave();
}

function updateTotalsOnly(courses) {
  if (!courses.length) { document.getElementById('totals-foot').innerHTML = ''; return; }
  const tbody = document.getElementById('course-tbody');
  const rows  = tbody.querySelectorAll('tr');
  rows.forEach((row, i) => {
    if (!courses[i]) return;
    const c = courses[i];
    const gp    = GRADE_POINTS[c.grade] ?? null;
    const units = parseFloat(c.units) || 0;
    const contrib = (gp !== null && units > 0 && c.grade !== '') ? (gp * units) : '—';
    const gpCell = row.querySelectorAll('td')[4];
    if (gpCell) gpCell.textContent = contrib === '—' ? '—' : contrib;
    const sel = row.querySelector('.grade-select');
    if (sel) sel.className = 'grade-select' + (c.grade ? ' grade-'+c.grade : '');
  });
  renderTotals(courses);
}

// ── Stats update ─────────────────────────────────────────────
function updateStats() {
  const sems = userData.semesters;
  SEMS.forEach(s => {
    const { gpa } = calcSemGPA(sems[s] || []);
    const mini = document.getElementById('mini-' + s);
    if (mini) {
      mini.textContent = fmt(gpa);
      mini.className = 'stat-value ' + gpaClass(gpa);
    }
    const stabGpa = document.getElementById('stab-gpa-' + s);
    if (stabGpa) stabGpa.textContent = fmt(gpa);
  });
  const { gpa: curGpa } = calcSemGPA(sems[currentSem] || []);
  const curEl = document.getElementById('stat-cur-gpa');
  curEl.textContent = fmt(curGpa);
  curEl.className   = 'stat-value ' + gpaClass(curGpa);

  const cgpa = calcCGPA(sems);
  document.getElementById('cgpa-big').textContent = fmt(cgpa);
  const clsEl = document.getElementById('cgpa-class');
  clsEl.textContent = classifyGPA(cgpa);
  clsEl.className   = 'cls ' + classifyBadge(cgpa);
}

// ── Auto-login check ────────────────────────────────────────
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = { id: session.user.id, email: session.user.email };
    try {
      await loadUserData();
      launchApp();
    } catch (err) {
      console.error('Failed to load user data', err);
      showToast('Error loading data', true);
    }
  } else {
    authScreen.style.display = 'flex';
  }
}

// ── Event Listeners ─────────────────────────────────────────
tabLogin.addEventListener('click', () => showAuthTab('login'));
tabRegister.addEventListener('click', () => showAuthTab('register'));
authSwitchLink.addEventListener('click', () => showAuthTab(authMode === 'login' ? 'register' : 'login'));

authSubmit.addEventListener('click', submitAuth);

authPassword.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAuth();
});
authEmail.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (authMode === 'register') authDept.focus();
    else authPassword.focus();
  }
});
authDept.addEventListener('keydown', e => {
  if (e.key === 'Enter') authPassword.focus();
});

// ── Init ─────────────────────────────────────────────────────
showAuthTab('login');
checkSession();
</script>
