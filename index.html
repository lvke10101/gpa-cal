<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>GradeVault — FUTO GPA Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* -------- (keep all your existing CSS exactly as before) -------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0e0f14;
  --surface:#16181f;
  --card:   #1c1f2a;
  --border: #2a2d3a;
  --border2:#353848;
  --gold:   #d4a843;
  --gold2:  #f0c96a;
  --green:  #2d7a4f;
  --green2: #3da86c;
  --red:    #c0392b;
  --red2:   #e74c3c;
  --blue:   #2980b9;
  --text:   #e8eaf0;
  --text2:  #9da0b0;
  --text3:  #6b6f80;
  --A: #3da86c; --B: #2980b9; --C: #d4a843; --D: #c0784a; --E: #c0392b; --F: #6b2d2d;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --radius: 14px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; -webkit-font-smoothing: antialiased; }

/* Auth screen */
#auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(ellipse at 30% 20%, #1a1230 0%, #0e0f14 60%); }
.auth-box { width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 40px 28px 32px; box-shadow: 0 0 60px rgba(212,168,67,0.07), var(--shadow); }
.auth-logo { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--gold); margin-bottom: 4px; }
.auth-tagline { color: var(--text3); font-size: 12px; margin-bottom: 32px; }
.auth-tabs { display: flex; background: var(--card); border-radius: 10px; padding: 4px; margin-bottom: 24px; gap: 4px; }
.auth-tab { flex: 1; padding: 9px; text-align: center; font-size: 13px; font-weight: 500; border-radius: 7px; cursor: pointer; color: var(--text3); transition: all 0.2s; border: none; background: none; font-family: inherit; }
.auth-tab.active { background: var(--gold); color: #0e0f14; }
.auth-field { margin-bottom: 14px; }
.auth-field label { display: block; font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.auth-field input, .auth-field select { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 13px 14px; font-family: inherit; font-size: 15px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.auth-field input:focus, .auth-field select:focus { border-color: var(--gold); }
.auth-field select option { background: var(--card); color: var(--text); }
.auth-error { font-size: 13px; color: var(--red2); background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.2); border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; display: none; }
.btn-full { width: 100%; background: var(--gold); color: #0e0f14; border: none; padding: 14px; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; font-family: inherit; transition: background 0.2s; margin-top: 6px; }
.btn-full:hover { background: var(--gold2); }
.btn-full:disabled { opacity: 0.5; cursor: not-allowed; }

/* Main app */
#app { display: none; min-height: 100vh; flex-direction: column; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: center; gap: 12px; height: 54px; flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
.header-logo { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold); }
header .spacer { flex: 1; }
.header-user { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 5px 12px 5px 6px; cursor: pointer; transition: border-color 0.2s; flex-shrink: 0; }
.header-user:hover { border-color: var(--gold); }
.header-avatar { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), #a07820); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 11px; color: #0e0f14; }
.header-username { font-size: 13px; font-weight: 500; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.logout-icon { color: var(--text3); font-size: 11px; }

.stats-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 0; align-items: center; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.stats-bar::-webkit-scrollbar { display: none; }
.stat-chip { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; padding-right: 16px; }
.stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; white-space: nowrap; }
.stat-value { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--gold); }
.stat-value.good { color: var(--green2); }
.stat-value.bad  { color: var(--red2); }
.stat-divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; margin-right: 16px; }
.stat-chip.sm .stat-value { font-size: 14px; color: var(--text2); }

.cgpa-badge { flex-shrink: 0; margin-left: auto; padding-left: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 16px; display: flex; flex-direction: column; align-items: center; }
.cgpa-badge .label { font-size: 10px; color: var(--text3); letter-spacing: 0.7px; text-transform: uppercase; margin-bottom: 1px; }
.cgpa-badge .val   { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); line-height: 1; }
.cgpa-badge .cls   { font-size: 10px; color: var(--text2); margin-top: 1px; }

.year-groups { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.year-groups::-webkit-scrollbar { display: none; }
.year-btn { padding: 10px 14px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; background: none; border: none; border-bottom: 2px solid transparent; font-family: inherit; }
.year-btn:hover { color: var(--text); }
.year-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

.sem-tabs { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; gap: 4px; }
.sem-tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border: none; border-bottom: 2px solid transparent; font-family: inherit; white-space: nowrap; }
.sem-tab:hover { color: var(--text); }
.sem-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.sem-tab .gpa-tag { display: block; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); margin-top: 1px; }
.sem-tab.active .gpa-tag { color: var(--gold); }

.content { flex: 1; padding: 16px; max-width: 900px; width: 100%; margin: 0 auto; }

.btn-upload:hover { border-color: var(--gold); color: var(--text); }

.course-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; min-width: 460px; }
thead th { background: var(--card); padding: 10px 12px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; }

tbody tr:last-child { border-bottom: none; }

td { padding: 8px 12px; font-size: 14px; }

.cell-input { background: transparent; border: 1px solid transparent; color: var(--text); font-family: inherit; font-size: 14px; padding: 5px 8px; border-radius: 7px; width: 100%; transition: all 0.15s; outline: none; -webkit-appearance: none; }
.cell-input:hover  { border-color: var(--border2); background: var(--card); }

.grade-select { appearance: none; -webkit-appearance: none; background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; padding: 5px 8px; border-radius: 7px; cursor: pointer; outline: none; transition: border-color 0.15s; min-width: 64px; text-align: center; }
.grade-select:focus { border-color: var(--gold); }
.grade-A { color: var(--A); } .grade-B { color: var(--B); }
.grade-C { color: var(--C); } .grade-D { color: var(--D); }
.grade-E { color: var(--E); } .grade-F { color: var(--F); }
.gp-cell { font-family: 'DM Mono', monospace; color: var(--text2); font-size: 12px; }
.btn-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; }
.btn-del:hover { color: var(--red2); background: rgba(192,57,43,0.1); }

.totals-row td { background: var(--card); border-top: 1px solid var(--border2); font-weight: 600; font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
.totals-row .total-gpa { color: var(--gold); font-size: 14px; }

.empty-state { padding: 48px 16px; text-align: center; }
.empty-state .icon { font-size: 36px; margin-bottom: 10px; opacity: 0.3; }
.empty-state p { color: var(--text3); font-size: 13px; }

.class-first        { color: var(--green2); }
.class-second-upper { color: #5dade2; }
.class-second-lower { color: var(--gold); }
.class-third        { color: #e59866; }
.class-pass         { color: var(--text3); }

.save-indicator { position: fixed; bottom: 16px; right: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 12px; color: var(--text3); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
.save-indicator.saving { opacity: 1; color: var(--gold); }
.save-indicator.saved  { opacity: 1; color: var(--green2); }

.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 13px; color: var(--text2); opacity: 0; transition: opacity 0.3s; z-index: 300; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.error { color: var(--red2); border-color: rgba(192,57,43,0.3); }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* extra spacing for upload button in header */
.header-actions { display: flex; align-items: center; gap: 10px; }
</style>
</head>

<script>
// ── Supabase configuration ──────────────────────────────────
const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';   // <-- replace
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';                // <-- replace

// Secret salt for pin generation (keep this same for all files)
const PIN_SALT = 'my-secret-salt-change-this';

// ── Initialize Supabase client ─────────────────────────────
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Constants ───────────────────────────────────────────────
const GRADE_POINTS = { A:5, B:4, C:3, D:2, E:1, F:0 };
const YEARS = [
  { label: 'Year 1', sems: ['y1s1','y1s2'] },
  { label: 'Year 2', sems: ['y2s1','y2s2'] },
  { label: 'Year 3', sems: ['y3s1','y3s2'] },
  { label: 'Year 4', sems: ['y4s1','y4s2'] },
  { label: 'Year 5', sems: ['y5s1','y5s2'] },
];
const SEMS = YEARS.flatMap(y => y.sems);
const SEM_NAMES = {
  y1s1:'Year 1 · Semester 1', y1s2:'Year 1 · Semester 2',
  y2s1:'Year 2 · Semester 1', y2s2:'Year 2 · Semester 2',
  y3s1:'Year 3 · Semester 1', y3s2:'Year 3 · Semester 2',
  y4s1:'Year 4 · Semester 1', y4s2:'Year 4 · Semester 2',
  y5s1:'Year 5 · Semester 1', y5s2:'Year 5 · Semester 2',
};
const SEM_SHORT = { y1s1:'S1', y1s2:'S2', y2s1:'S1', y2s2:'S2', y3s1:'S1', y3s2:'S2', y4s1:'S1', y4s2:'S2', y5s1:'S1', y5s2:'S2' };

// ── State ───────────────────────────────────────────────────
let currentUser = null;      // { id, email, user_metadata? }
let userData = null;         // { department, semesters, courses }
let currentYear = 0;
let currentSem = 'y1s1';
let saveTimer = null;

// ── Helpers ──────────────────────────────────────────────────
function showToast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2800);
}

function fmt(n) { return n === null ? '—' : n.toFixed(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function gpaClass(gpa) {
  if (gpa === null) return '';
  return gpa >= 3.5 ? 'good' : gpa < 2.0 ? 'bad' : '';
}

function classifyGPA(cgpa) {
  if (cgpa === null) return '';
  if (cgpa >= 4.5) return 'First Class';
  if (cgpa >= 3.5) return '2nd Class Upper';
  if (cgpa >= 2.5) return '2nd Class Lower';
  if (cgpa >= 1.5) return 'Third Class';
  return 'Pass';
}

function classifyBadge(cgpa) {
  if (cgpa === null) return '';
  if (cgpa >= 4.5) return 'class-first';
  if (cgpa >= 3.5) return 'class-second-upper';
  if (cgpa >= 2.5) return 'class-second-lower';
  if (cgpa >= 1.5) return 'class-third';
  return 'class-pass';
}

function calcSemGPA(courses) {
  let tgp = 0, tnu = 0;
  courses.forEach(c => {
    const units = parseFloat(c.units) || 0;
    const gp    = GRADE_POINTS[c.grade] ?? null;
    if (units > 0 && gp !== null && c.grade !== '') {
      tgp += gp * units;
      tnu += units;
    }
  });
  if (tnu === 0) return { tgp: 0, tnu: 0, gpa: null };
  return { tgp, tnu, gpa: tgp / tnu };
}

function calcCGPA(sems) {
  let totalTGP = 0, totalTNU = 0;
  SEMS.forEach(s => {
    const { tgp, tnu } = calcSemGPA(sems[s] || []);
    totalTGP += tgp;
    totalTNU += tnu;
  });
  return totalTNU === 0 ? null : totalTGP / totalTNU;
}

// ── Auth ────────────────────────────────────────────────────
let authMode = 'login';

function showAuthTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-register').classList.toggle('active', mode === 'register');
  document.getElementById('auth-submit').textContent = mode === 'login' ? 'Login' : 'Create Account';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-password').autocomplete = mode === 'login' ? 'current-password' : 'new-password';
  // show department field only on register
  document.getElementById('dept-field').style.display = mode === 'register' ? 'block' : 'none';
}

function setAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function submitAuth() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  const department = document.getElementById('auth-dept').value.trim();
  const btn = document.getElementById('auth-submit');

  if (!username || !password) { setAuthError('Please fill in all fields.'); return; }
  if (authMode === 'register' && !department) { setAuthError('Please select your department.'); return; }

  btn.disabled = true;
  btn.textContent = authMode === 'login' ? 'Logging in…' : 'Creating account…';
  document.getElementById('auth-error').style.display = 'none';

  try {
    let result;
    if (authMode === 'login') {
      result = await supabase.auth.signInWithPassword({ email: username + '@temp.local', password });
    } else {
      result = await supabase.auth.signUp({ email: username + '@temp.local', password });
      if (result.error) throw result.error;
      // After signup, create profile with department
      if (result.data.user) {
        await supabase.from('gpa_data').upsert({
          id: result.data.user.id,
          department: department,
          semesters: {},
          courses: {}
        });
      }
    }
    if (result.error) throw result.error;

    // Login success
    const user = result.data.user;
    currentUser = { id: user.id, email: user.email };
    // Fetch user data
    await loadUserData();
    launchApp();
  } catch (err) {
    setAuthError(err.message || 'Authentication failed');
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Login' : 'Create Account';
  }
}

async function loadUserData() {
  if (!currentUser) return;
  const { data, error } = await supabase
    .from('gpa_data')
    .select('*')
    .eq('id', currentUser.id)
    .maybeSingle();
  if (error) throw error;
  if (!data) {
    // create default
    const { data: newData, error: insErr } = await supabase
      .from('gpa_data')
      .insert({ id: currentUser.id, department: '', semesters: {}, courses: {} })
      .select()
      .single();
    if (insErr) throw insErr;
    userData = newData;
  } else {
    userData = data;
  }
  // Ensure semesters object has all keys
  const sems = userData.semesters || {};
  SEMS.forEach(s => { if (!(s in sems)) sems[s] = []; });
  userData.semesters = sems;
  if (!userData.courses) userData.courses = {};
}

function launchApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('header-name').textContent = currentUser.email.split('@')[0];
  document.getElementById('header-av').textContent = currentUser.email.charAt(0).toUpperCase();

  buildYearTabs();
  buildMiniChips();
  switchYear(0, true);
}

async function doLogout() {
  await supabase.auth.signOut();
  currentUser = null; userData = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ── Course upload (with pin) ────────────────────────────────
function generatePin(userId) {
  // Simple SHA256 hash of userId + secret salt
  const encoder = new TextEncoder();
  const data = encoder.encode(userId + PIN_SALT);
  return crypto.subtle.digest('SHA-256', data).then(buf => {
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  });
}

async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const json = JSON.parse(text);
    // Expected format: { pin: '...', courses: { y1s1: [...], ... } }
    if (!json.pin || typeof json.courses !== 'object') {
      showToast('Invalid file format', true);
      return;
    }
    // Verify pin
    const expectedPin = await generatePin(currentUser.id);
    if (json.pin !== expectedPin) {
      showToast('This file is not authorized for your account', true);
      return;
    }
    // Store courses
    userData.courses = json.courses || {};
    // Ensure only valid semesters
    const validCourses = {};
    SEMS.forEach(s => { validCourses[s] = Array.isArray(json.courses[s]) ? json.courses[s] : []; });
    userData.courses = validCourses;
    await saveToSupabase();
    showToast('Courses uploaded successfully!');
    // Re-render current semester (to show new dropdown suggestions)
    renderTable();
  } catch (err) {
    showToast('Error reading file: ' + err.message, true);
  }
  event.target.value = ''; // reset
}

// ── Supabase save ────────────────────────────────────────────
async function saveToSupabase() {
  if (!currentUser) return;
  const { error } = await supabase
    .from('gpa_data')
    .upsert({
      id: currentUser.id,
      department: userData.department || '',
      semesters: userData.semesters,
      courses: userData.courses
    });
  if (error) throw error;
}

function scheduleSave() {
  const ind = document.getElementById('save-ind');
  ind.textContent = 'Saving…';
  ind.className = 'save-indicator saving';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await saveToSupabase();
      ind.textContent = 'Saved ✓';
      ind.className = 'save-indicator saved';
      setTimeout(() => { ind.className = 'save-indicator'; }, 1800);
    } catch (err) {
      ind.textContent = 'Save failed';
      ind.className = 'save-indicator saving';
      setTimeout(() => { ind.className = 'save-indicator'; }, 2500);
      showToast('Save error: ' + err.message, true);
    }
  }, 900);
}

// ── UI Builders ─────────────────────────────────────────────
function buildYearTabs() {
  const container = document.getElementById('year-groups');
  container.innerHTML = YEARS.map((y, i) =>
    `<button class="year-btn" id="ybtn-${i}" onclick="switchYear(${i})">${y.label}</button>`
  ).join('');
}

function buildMiniChips() {
  const container = document.getElementById('mini-chips');
  container.innerHTML = YEARS.map(y =>
    y.sems.map(s =>
      `<div class="stat-chip sm" style="padding-right:12px;">
        <div class="stat-label">${s.toUpperCase()}</div>
        <div class="stat-value" id="mini-${s}">—</div>
      </div>`
    ).join('')
  ).join('');
}

function switchYear(idx, firstLoad=false) {
  currentYear = idx;
  document.querySelectorAll('.year-btn').forEach((b,i) =>
    b.classList.toggle('active', i === idx)
  );
  const year = YEARS[idx];
  const semTabs = document.getElementById('sem-tabs');
  semTabs.innerHTML = year.sems.map(s =>
    `<button class="sem-tab" id="stab-${s}" onclick="switchSem('${s}')">
      ${SEM_SHORT[s]}
      <span class="gpa-tag" id="stab-gpa-${s}">—</span>
    </button>`
  ).join('');
  const target = firstLoad ? 'y1s1' : (year.sems.includes(currentSem) ? currentSem : year.sems[0]);
  switchSem(target);
}

function switchSem(sem) {
  currentSem = sem;
  const yearIdx = YEARS.findIndex(y => y.sems.includes(sem));
  if (yearIdx !== -1 && yearIdx !== currentYear) {
    switchYear(yearIdx, false);
    return;
  }
  document.querySelectorAll('.sem-tab').forEach(t =>
    t.classList.toggle('active', t.id === 'stab-' + sem)
  );
  document.getElementById('sem-title').textContent = SEM_NAMES[sem];
  renderTable();
  updateStats();
}

// ── Table rendering ──────────────────────────────────────────
function renderTable() {
  const courses = userData.semesters[currentSem] || [];
  const tbody   = document.getElementById('course-tbody');
  const tfoot   = document.getElementById('totals-foot');

  if (courses.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
      <div class="icon">📚</div>
      <p>No courses yet. Tap <strong>Add Course</strong> to get started.</p>
    </div></td></tr>`;
    tfoot.innerHTML = '';
    document.getElementById('sem-gpa-detail').textContent = '';
    return;
  }

  tbody.innerHTML = courses.map((c, i) => {
    const gp    = GRADE_POINTS[c.grade] ?? null;
    const units = parseFloat(c.units) || 0;
    const contrib = (gp !== null && units > 0 && c.grade !== '') ? (gp * units) : '—';
    const gradeClass = c.grade ? `grade-${c.grade}` : '';
    return `<tr>
      <td><input class="cell-input" value="${esc(c.code)}" placeholder="e.g. FRS 301"
            oninput="updateField(${i},'code',this.value)"/></td>
      <td><input class="cell-input" value="${esc(c.title)}" placeholder="Course title…"
            oninput="updateField(${i},'title',this.value)"/></td>
      <td style="text-align:center">
        <input class="cell-input unit-input" type="number" min="1" max="6"
          value="${c.units||''}" placeholder="2"
          oninput="updateField(${i},'units',this.value)"/>
      </td>
      <td style="text-align:center">
        <select class="grade-select ${gradeClass}" onchange="updateField(${i},'grade',this.value)">
          <option value="">—</option>
          ${['A','B','C','D','E','F'].map(g =>
            `<option value="${g}" ${c.grade===g?'selected':''} class="grade-${g}">${g}</option>`
          ).join('')}
        </select>
      </td>
      <td class="gp-cell" style="text-align:center">${contrib === '—' ? '—' : contrib}</td>
      <td><button class="btn-del" onclick="deleteCourse(${i})">✕</button></td>
    </tr>`;
  }).join('');

  renderTotals(courses);
}

function renderTotals(courses) {
  const { tgp, tnu, gpa } = calcSemGPA(courses);
  const tfoot = document.getElementById('totals-foot');
  tfoot.innerHTML = `
    <tr class="totals-row">
      <td colspan="2" style="text-align:right">Totals</td>
      <td style="text-align:center">${tnu || '—'}</td>
      <td></td>
      <td style="text-align:center">${tgp || '—'}</td>
      <td></td>
    </tr>
    <tr class="totals-row">
      <td colspan="4" style="text-align:right;color:var(--text3)">Semester GPA</td>
      <td class="total-gpa" style="text-align:center">${fmt(gpa)}</td>
      <td></td>
    </tr>`;
  document.getElementById('sem-gpa-detail').textContent =
    gpa !== null ? `TGP ${tgp} ÷ TNU ${tnu} = ${fmt(gpa)}` : '';
}

// ── Course actions ──────────────────────────────────────────
function addCourse() {
  const courses = userData.semesters[currentSem];
  // If we have a course catalog for this semester, show a dropdown to select.
  // We'll create a new row with empty fields, but we can also provide a quick pick.
  // Let's just add an empty course; user can fill via dropdown? We'll implement a simple dropdown in each row later.
  // For now, we add blank and user fills manually.
  courses.push({ code:'', title:'', units:'', grade:'' });
  renderTable();
  updateStats();
  scheduleSave();
  // Focus on code input of new row
  setTimeout(() => {
    const inputs = document.querySelectorAll('#course-tbody tr:last-child input:first-child');
    if (inputs.length) inputs[0].focus();
  }, 50);
}

function deleteCourse(i) {
  userData.semesters[currentSem].splice(i, 1);
  renderTable();
  updateStats();
  scheduleSave();
}

function updateField(i, field, val) {
  userData.semesters[currentSem][i][field] = val;
  updateTotalsOnly(userData.semesters[currentSem]);
  updateStats();
  scheduleSave();
}

function updateTotalsOnly(courses) {
  if (!courses.length) { document.getElementById('totals-foot').innerHTML = ''; return; }
  const tbody = document.getElementById('course-tbody');
  const rows  = tbody.querySelectorAll('tr');
  rows.forEach((row, i) => {
    if (!courses[i]) return;
    const c = courses[i];
    const gp    = GRADE_POINTS[c.grade] ?? null;
    const units = parseFloat(c.units) || 0;
    const contrib = (gp !== null && units > 0 && c.grade !== '') ? (gp * units) : '—';
    const gpCell = row.querySelectorAll('td')[4];
    if (gpCell) gpCell.textContent = contrib === '—' ? '—' : contrib;
    const sel = row.querySelector('.grade-select');
    if (sel) sel.className = 'grade-select' + (c.grade ? ' grade-'+c.grade : '');
  });
  renderTotals(courses);
}

// ── Stats update ─────────────────────────────────────────────
function updateStats() {
  const sems = userData.semesters;
  SEMS.forEach(s => {
    const { gpa } = calcSemGPA(sems[s] || []);
    const mini = document.getElementById('mini-' + s);
    if (mini) {
      mini.textContent = fmt(gpa);
      mini.className = 'stat-value ' + gpaClass(gpa);
    }
    const stabGpa = document.getElementById('stab-gpa-' + s);
    if (stabGpa) stabGpa.textContent = fmt(gpa);
  });
  const { gpa: curGpa } = calcSemGPA(sems[currentSem] || []);
  const curEl = document.getElementById('stat-cur-gpa');
  curEl.textContent = fmt(curGpa);
  curEl.className   = 'stat-value ' + gpaClass(curGpa);

  const cgpa = calcCGPA(sems);
  document.getElementById('cgpa-big').textContent = fmt(cgpa);
  const clsEl = document.getElementById('cgpa-class');
  clsEl.textContent = classifyGPA(cgpa);
  clsEl.className   = 'cls ' + classifyBadge(cgpa);
}

// ── Auto-login check ────────────────────────────────────────
async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    currentUser = { id: session.user.id, email: session.user.email };
    try {
      await loadUserData();
      launchApp();
    } catch (err) {
      console.error('Failed to load user data', err);
      showToast('Error loading data', true);
    }
  } else {
    // show auth
    document.getElementById('auth-screen').style.display = 'flex';
  }
}

// ── Init ─────────────────────────────────────────────────────
showAuthTab('login'); // default
document.getElementById('auth-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAuth();
});
document.getElementById('auth-username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('auth-password').focus();
});

// Start
checkSession();
</script>
